<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/CSS/styles.css">
  <title>Document</title>
</head>
<body>
  <header class="w-full">
    <h1 class="text-4xl text-center">Meal Prep App</h1>
  </header>
  <main>
    <nav>*Search Box
      <form>
        <label for="mealSearch">Search Meals:</label>
        <input type="text" id="mealSearch" name="mealSearch" class="border">
        <button type="submit">Random Meal</button>
      </form>
    </nav>

    <section class="flex w-[80%] h-75 border">Meal Card Container
      <div class="transform-3d w-40">
        <div class="meal-card w-36 h-48 relative border transition-transform duration-1000 perspective-midrange">
          <div class="w-full h-full absolute inset-0 bg-blue-600" id="meal-front">meal</div>
          <div class="w-full h-full absolute inset-0 bg-green-300 top-0 left-0 z-[-1]" id="meal-back">nutrients</div>
        </div>
      </div>
    </section>
    
    <div>Saved Meals</div>
  </main>

  <footer>
    <p>&copy; 2026 My Meal Prep App. All rights reserved.</p>
    <p>Project Contributors: Justin, John, Jack, Luke</p>
  </footer>
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
