<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assests/CSS/output.css">
  <title>Document</title>
</head>
<body>
  <header>
    <h1 class="text-4xl">My Meal Prep App</h1>
  </header>
  <main>
    <section>*Search Box
      <label for="mealSearch">Search Meals:</label>
      <input type="text" id="mealSearch" name="mealSearch" class="border">
      <button>Random Meal</button>
    </section>

    <section class="flex w-[80%] h-75 border">Meal Card Container
      <div class="meal-card w-36 h-48 relative border">
        <div class="w-full h-full bg-blue-600" id="meal-front backface-hidden">meal</div>
        <div class="w-full h-full absolute bg-green-300 top-0 left-0 backface-hidden z-[-1]" id="meal-back">nutrients</div>
      </div>
    </section>
    
    <div>Saved Meals</div>
  </main>

  <footer>

  </footer>
